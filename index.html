<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Roommate Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Find Your Perfect Roommate</h1>
            <p>Fill out your lifestyle preferences to find the best hostel match.</p>
        </header>

        <main>
            <div id="registrationCard" class="card glass">
                <h2>Your Profile</h2>
                <form id="registrationForm">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>

                    <div class="input-group">
                        <label for="sleep_schedule">Sleep Schedule</label>
                        <select id="sleep_schedule" name="sleep_schedule" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="Early Bird">Early Bird (Sleep early, wake up early)</option>
                            <option value="Night Owl">Night Owl (Sleep late, wake up late)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="cleanliness">Cleanliness</label>
                        <select id="cleanliness" name="cleanliness" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="Neat">Neat & Tidy</option>
                            <option value="Average">Average</option>
                            <option value="Messy">Messy</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="sociability">Sociability</label>
                        <select id="sociability" name="sociability" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="Introvert">Introvert (Values quiet time)</option>
                            <option value="Extrovert">Extrovert (Loves socializing)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Find Matches</button>
                    <div id="formMessage" class="message"></div>
                </form>
            </div>

            <div id="matchesSection" class="card glass hidden">
                <h2>Your Top Matches</h2>
                <div id="matchesContainer" class="matches-grid">
                    <!-- Matches will be populated here by JS -->
                </div>
                <button id="resetBtn" class="btn-secondary mt-4">Start Over</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
